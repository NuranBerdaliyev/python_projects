
{% extends 'first/base.html' %}
{% block title %}
Detail information about {{boxer.fullname}}
{% endblock %}

{%block content%}
<div class="mycard">
    <h1>Details of {{boxer.fullname}}</h1>
    <p>HP: {{boxer.hp}}</p>
    <p>Strongest attack: {{boxer.strongest_attack}}</p>
</div>
<div class="topnav">
    <p><a href="{% url 'ifelse' id_thisboxer=boxer.id %}">Is this boxer cool?</a></p>
    <footer><a href="{% url 'all_details' %}">Back to Boxer Detail List</a></footer>
</div>
{%endblock%}
