<h1>Category: {{category.name}}</h1>
<div>
    <p>Tasks for this category:</p>
    <ul>
        {% for task in tasks %}
            <li><a href="{% url 'tasks_detail' task.id %}">{{task.title}}</a></li>
        {% empty %}
            <li>No tasks for this category yet</li>
        {% endfor %}
    </ul>
</div>
