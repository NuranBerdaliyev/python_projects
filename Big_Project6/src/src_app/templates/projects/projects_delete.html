{% extends "base.html" %}

{% block title %}Delete project{% endblock %}

{% block content %}
<div class="card">
    <h1>Delete Project</h1>
    <p>Are you sure you want to delete {{ project }}?</p>

    <form method="post">
        {% csrf_token %}
        <button class="btn-danger" type="submit">Delete</button>
        <a class="btn-secondary" href="{% url 'projects_detail' project.id %}">Cancel</a>
    </form> 
</div>
{% endblock %}
