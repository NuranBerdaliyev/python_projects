{% extends "base.html" %}

{% block title %}Delete category{% endblock %}

{% block content %}
    <div class="card">
        <h1>Delete Category</h1>
        <p>Are you sure you want to delete {{ category }}?</p>

        <form method="post">
            {% csrf_token %}
            <button class="btn-danger" type="submit">Delete</button>
            <a class="btn-secondary" href="{% url 'categories_detail' category.id %}">Cancel</a>
        </form>
    </div>
{% endblock %}
